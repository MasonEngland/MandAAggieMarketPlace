# docker compose for dev environment. Uses a self signed ssl certificate
# this file is removed before deploying

version: '3.9'

services:
  db:
    image: mysql:8
    container_name: server-database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: MandAMarketplace
    volumes:
      - server-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"
    networks:
      - manda-network
    command:
      --innodb-buffer-pool-size=128M
      --max-allowed-packet=16M
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  migrations:
    image: mcr.microsoft.com/dotnet/sdk:7.0
    container_name: server-migrations
    depends_on:
      - db
    working_dir: /app
    volumes:
      - .:/app
    environment:
      ConnectionStrings__Default: ${DB_CONNECTION_STRING}
    command: >
      sh -c "
        dotnet tool install --global dotnet-ef --version 7.* &&
        export PATH=\"$PATH:/root/.dotnet/tools\" &&
        dotnet restore &&
        sleep 30 &&
        dotnet ef database update
      "
    networks:
      - manda-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: server-api
    depends_on:
      - db
      - migrations
    ports:
      - "127.0.0.1:5001:8080"
    environment:
      ConnectionStrings__Default: ${DB_CONNECTION_STRING}
    networks:
      - manda-network
  
  nginx:
    image: nginx:alpine
    container_name: server-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - manda-network

  cert-generator:
    image: alpine:latest
    container_name: cert-generator
    command: > 
      sh -c "apk add --no-cache openssl && mkdir -p /certs && if [ ! -f /certs/selfsigned.crt ] || [ ! -f /certs/selfsigned.key ]; then openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /certs/selfsigned.key -out /certs/selfsigned.crt -subj '/C=US/ST=Utah/L=Logan/O=MyOrg/CN=localhost'; fi"
    volumes:
      - certs:/certs
    networks:
      - manda-network
        
  

volumes:
  server-data:
  certs:

networks:
  manda-network: